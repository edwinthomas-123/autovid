services:
  backend:
    build: 
      context: ./server
    container_name: autovid-backend
    ports:
      - "3001:3001"
    volumes:
      - ./server/projects_db.json:/app/projects_db.json
      - ./server/keys_db.json:/app/keys_db.json
      - ./server/social_db.json:/app/social_db.json
      - ./server/series_db.json:/app/series_db.json
      - ./server/scout_db.json:/app/scout_db.json
      - ./server/upload_history.json:/app/upload_history.json
      - ./server/google_token.json:/app/google_token.json
      - ./server/output:/app/output
      - ./server/test_assets:/app/test_assets
      - ./server/background_clips:/app/background_clips
    environment:
      - BASE_URL=https://wellvid.tech
      - PORT=3001

    networks:
      - wellvid-network
    restart: unless-stopped

  web:
    build: 
      context: .
    container_name: autovid-web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot
    depends_on:
      - backend
    networks:
      - wellvid-network
    restart: always

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot
    command: certonly --webroot --webroot-path=/var/www/certbot --email admin@wellvid.tech --agree-tos --no-eff-email -d wellvid.tech -d www.wellvid.tech
    networks:
      - wellvid-network

networks:
  wellvid-network:
    driver: bridge

volumes:
  certbot-etc:
  certbot-var:
  webroot:
