server {
    listen 80;
    server_name wellvid.tech www.wellvid.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name wellvid.tech www.wellvid.tech;

    ssl_certificate /etc/letsencrypt/live/wellvid.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wellvid.tech/privkey.pem;

    # Standard security headers
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers "EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH";

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend container
    location /api {
        proxy_pass http://autovid-backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy output requests (static videos) to the backend container
    location /output {
        proxy_pass http://autovid-backend:3001;
        proxy_set_header Host $host;
    }

    # Proxy test_assets requests to the backend container
    location /test_assets {
        proxy_pass http://autovid-backend:3001;
        proxy_set_header Host $host;
    }
}
